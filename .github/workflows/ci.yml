name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

# Uncomment to enable CI on direct push to main (after branch protection is solid)
# on:
#   push:
#     branches: [main]

env:
  TF_VERSION: "1.7.5"
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_DEFAULT_REGION: us-east-1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform fmt -check -recursive

  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Init (dry run)
        run: terraform init -backend=false
      - name: Validate
        run: terraform validate
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      - name: TFLint
        run: tflint --init && tflint --format compact

  plan-dry-run:
    name: Plan (dry run)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Init (dry run)
        run: terraform init -backend=false
      - name: Plan (dry run)
        run: terraform plan -var-file=example.tfvars

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

